<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touchstorm &amp; Google — Our Menu of Services</title>
<style>
  :root {
    --pink: #EF5C8D;
    --pink-dark: #d94a7a;
    --gray-bg: #f5f5f5;
    --white: #ffffff;
    --text-dark: #333333;
    --font: Helvetica, Arial, sans-serif;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font);
    color: var(--text-dark);
    background: var(--white);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Section Header ── */
  .section-header {
    text-align: center;
    padding: 80px 24px 48px;
    background: var(--white);
  }

  .section-header .eyebrow {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 20px;
  }

  .section-header .heading {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--text-dark);
  }

  .section-header .heading span {
    color: var(--pink);
  }

  .section-header .subtext {
    margin-top: 16px;
    font-size: 17px;
    color: #666;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  /* ── Pill Bar ── */
  .pill-bar-wrapper {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: box-shadow 0.3s ease;
    border-bottom: 1px solid transparent;
  }

  .pill-bar-wrapper.is-stuck {
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    border-bottom-color: rgba(0,0,0,0.06);
  }

  .pill-bar {
    display: flex;
    gap: 10px;
    padding: 14px 24px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .pill-bar::-webkit-scrollbar {
    display: none;
  }

  .pill {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: #eaeaea;
    color: var(--text-dark);
    border: none;
    transition: background 0.25s ease, color 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
    white-space: nowrap;
    user-select: none;
  }

  .pill:hover {
    background: #ddd;
    transform: translateY(-1px);
  }

  .pill.active {
    background: var(--pink);
    color: var(--white);
    box-shadow: 0 4px 14px rgba(239,92,141,0.35);
  }

  .pill.active:hover {
    background: var(--pink-dark);
  }

  .pill .pill-num {
    opacity: 0.6;
    font-size: 11px;
    font-weight: 700;
  }

  .pill.active .pill-num {
    opacity: 0.85;
  }

  /* ── Service Panels ── */
  .service-panel {
    display: flex;
    align-items: center;
    min-height: 520px;
    padding: 80px 48px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .service-panel.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .service-panel:nth-child(even) {
    background: var(--gray-bg);
  }

  .service-panel:nth-child(odd) {
    background: var(--white);
  }

  .panel-inner {
    display: flex;
    align-items: center;
    gap: 64px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .service-panel:nth-child(even) .panel-inner {
    flex-direction: row-reverse;
  }

  .panel-text {
    flex: 1;
    position: relative;
    z-index: 2;
  }

  .panel-image {
    flex: 1;
    position: relative;
    z-index: 2;
  }

  /* Watermark number */
  .panel-text .watermark {
    position: absolute;
    top: -30px;
    left: -10px;
    font-size: 140px;
    font-weight: 800;
    color: rgba(0,0,0,0.04);
    line-height: 1;
    z-index: -1;
    pointer-events: none;
    user-select: none;
  }

  .service-panel:nth-child(even) .panel-text .watermark {
    color: rgba(0,0,0,0.05);
  }

  .panel-text h3 {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-dark);
    margin-bottom: 12px;
    line-height: 1.25;
  }

  .panel-text .pink-rule {
    width: 40px;
    height: 3px;
    background: var(--pink);
    border: none;
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .panel-text .description {
    font-size: 16px;
    line-height: 1.7;
    color: #555;
    margin-bottom: 24px;
    max-width: 480px;
  }

  .price-pill {
    display: inline-block;
    padding: 8px 20px;
    background: rgba(239,92,141,0.1);
    color: var(--pink-dark);
    font-size: 14px;
    font-weight: 700;
    border-radius: 999px;
    margin-bottom: 20px;
  }

  .learn-more {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--pink);
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    transition: gap 0.2s ease, color 0.2s ease;
  }

  .learn-more:hover {
    color: var(--pink-dark);
    gap: 10px;
  }

  .learn-more::after {
    content: '\2192';
    font-size: 18px;
    transition: transform 0.2s ease;
  }

  /* Image placeholder */
  .image-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: #e8e8e8;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border: 2px dashed #ccc;
    transition: border-color 0.3s ease;
  }

  .image-placeholder:hover {
    border-color: var(--pink);
  }

  .image-placeholder svg {
    width: 48px;
    height: 48px;
    opacity: 0.35;
  }

  .image-placeholder span {
    font-size: 14px;
    font-weight: 600;
    color: #999;
  }

  /* ── Responsive ── */
  @media (max-width: 860px) {
    .service-panel {
      padding: 56px 24px;
      min-height: auto;
    }

    .panel-inner,
    .service-panel:nth-child(even) .panel-inner {
      flex-direction: column;
      gap: 36px;
    }

    .panel-text .watermark {
      font-size: 90px;
      top: -20px;
    }

    .panel-text h3 {
      font-size: 24px;
    }

    .image-placeholder {
      max-width: 400px;
    }
  }
</style>
</head>
<body>

<!-- Section Header -->
<section class="section-header">
  <p class="eyebrow">Our Menu of Services</p>
  <h2 class="heading">[Touchstorm] <span>&times;</span> [Google]</h2>
  <p class="subtext">YouTube-powered intelligence and management services to grow your brand, outpace competitors, and own your category.</p>
</section>

<!-- Sticky Pill Bar -->
<div class="pill-bar-wrapper" id="pillBarWrapper">
  <nav class="pill-bar" id="pillBar" aria-label="Service navigation"></nav>
</div>

<!-- Service Panels -->
<div id="servicePanels"></div>

<script>
(function() {
  const services = [
    {
      num: '01', name: 'Custom Strategy Analysis', shortName: 'Strategy Analysis',
      price: 'Starting at $2,500 per engagement',
      desc: 'A bespoke deep-dive into your brand\'s YouTube presence and competitive landscape. Our strategists audit your current performance, identify whitespace opportunities, and deliver an actionable roadmap tailored to your goals.'
    },
    {
      num: '02', name: 'Brand Buzz Monitor', shortName: 'Buzz Monitor',
      price: 'Starting at $1,000/year',
      desc: 'Track real-time conversations about your brand across the YouTube ecosystem. Brand Buzz Monitor surfaces emerging sentiment shifts, viral moments, and creator mentions so you can respond before the news cycle moves on.'
    },
    {
      num: '03', name: 'Category Trends', shortName: 'Category Trends',
      price: 'Starting at $1,200/year',
      desc: 'Stay ahead of your market with continuous trend analysis across your product category on YouTube. Identify rising topics, seasonal patterns, and audience interest shifts that inform smarter content and media decisions.'
    },
    {
      num: '04', name: 'Topic Finder', shortName: 'Topic Finder',
      price: 'Starting at $800/year',
      desc: 'Never run out of high-impact video ideas. Topic Finder uses search demand and competitive gaps to surface the exact subjects your target audience is actively looking for on YouTube.'
    },
    {
      num: '05', name: 'Global Brand Consistency', shortName: 'Brand Consistency',
      price: 'Starting at $3,000/year',
      desc: 'Ensure your brand message stays unified across every region and language on YouTube. We audit localized channels, flag inconsistencies in metadata and creative, and provide governance frameworks for global teams.'
    },
    {
      num: '06', name: 'Casting Cards', shortName: 'Casting Cards',
      price: 'Starting at $1,500 per search',
      desc: 'Find the perfect creator partners for your next campaign. Casting Cards delivers vetted talent profiles with audience overlap data, brand-safety scores, and engagement benchmarks so you cast with confidence.'
    },
    {
      num: '07', name: 'Competitive Insights - Ranker', shortName: 'Ranker',
      price: 'Starting at $2,000/year',
      desc: 'Know exactly where you stand against every competitor on YouTube. Ranker provides head-to-head performance rankings, share-of-search metrics, and publishing cadence analysis updated on a continuous basis.'
    },
    {
      num: '08', name: 'YT Social Listening - Influencer Focus', shortName: 'Influencer Listening',
      price: 'Starting at $1,500/year',
      desc: 'Monitor what key influencers in your space are saying, creating, and endorsing. This service maps creator networks, tracks collaboration patterns, and alerts you to partnership or competitive risks in real time.'
    },
    {
      num: '09', name: 'YT Social Listening - Sentiment Focus', shortName: 'Sentiment Listening',
      price: 'Starting at $1,500/year',
      desc: 'Go beyond view counts to understand how audiences feel about your brand on YouTube. Sentiment Focus analyzes comment threads, reaction ratios, and qualitative signals to quantify brand perception at scale.'
    },
    {
      num: '10', name: 'Share of Voice', shortName: 'Share of Voice',
      price: 'Starting at $2,500/year',
      desc: 'Measure your brand\'s visibility relative to competitors across YouTube search, suggested feeds, and trending topics. Share of Voice delivers a clear picture of your owned, earned, and paid presence over time.'
    },
    {
      num: '11', name: 'Strategic Channel Business Plan', shortName: 'Channel Plan',
      price: 'Starting at $5,000 per plan',
      desc: 'A comprehensive business plan for your YouTube channel covering audience growth targets, content pillars, monetization strategy, and resource requirements. Built to align stakeholders and secure executive buy-in.'
    },
    {
      num: '12', name: 'Community Management', shortName: 'Community Mgmt',
      price: 'Starting at $1,200/month',
      desc: 'Keep your YouTube community engaged, moderated, and growing. Our team handles comment responses, sentiment escalation, and fan engagement programs so your audience feels heard around the clock.'
    },
    {
      num: '13', name: 'Channel Management', shortName: 'Channel Mgmt',
      price: 'Starting at $3,500/month',
      desc: 'Full-service YouTube channel operations from upload scheduling and metadata optimization to thumbnail testing and analytics reporting. We handle the day-to-day so your team can focus on creative and strategy.'
    }
  ];

  // Build pills
  const pillBar = document.getElementById('pillBar');
  services.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (i === 0 ? ' active' : '');
    btn.setAttribute('data-index', i);
    btn.innerHTML = `<span class="pill-num">${s.num}</span>${s.shortName}`;
    btn.addEventListener('click', () => {
      const panel = document.getElementById('panel-' + i);
      if (panel) {
        const offset = document.getElementById('pillBarWrapper').offsetHeight + 12;
        const top = panel.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    });
    pillBar.appendChild(btn);
  });

  // Build panels
  const container = document.getElementById('servicePanels');
  const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;

  services.forEach((s, i) => {
    const panel = document.createElement('section');
    panel.className = 'service-panel';
    panel.id = 'panel-' + i;
    panel.innerHTML = `
      <div class="panel-inner">
        <div class="panel-text">
          <div class="watermark">${s.num}</div>
          <h3>${s.name}</h3>
          <hr class="pink-rule">
          <p class="description">${s.desc}</p>
          <div class="price-pill">${s.price}</div>
          <br>
          <a href="#" class="learn-more" onclick="event.preventDefault()">Learn More</a>
        </div>
        <div class="panel-image">
          <div class="image-placeholder">
            ${svgIcon}
            <span>Add Image Here</span>
          </div>
        </div>
      </div>
    `;
    container.appendChild(panel);
  });

  // Intersection Observer — highlight active pill
  const pills = document.querySelectorAll('.pill');
  const panels = document.querySelectorAll('.service-panel');

  const activateObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = parseInt(entry.target.id.replace('panel-', ''), 10);
        pills.forEach(p => p.classList.remove('active'));
        pills[idx].classList.add('active');
        // Scroll pill into view within bar
        pills[idx].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
    });
  }, {
    rootMargin: '-40% 0px -40% 0px',
    threshold: 0
  });

  panels.forEach(p => activateObserver.observe(p));

  // Fade-in observer
  const fadeObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, {
    rootMargin: '0px 0px -80px 0px',
    threshold: 0.05
  });

  panels.forEach(p => fadeObserver.observe(p));

  // Sticky shadow detection
  const wrapper = document.getElementById('pillBarWrapper');
  const stickyObserver = new IntersectionObserver(([entry]) => {
    wrapper.classList.toggle('is-stuck', !entry.isIntersecting);
  }, { threshold: 1, rootMargin: '-1px 0px 0px 0px' });

  // Sentinel element right above the pill bar
  const sentinel = document.createElement('div');
  sentinel.style.height = '1px';
  sentinel.style.width = '100%';
  sentinel.style.position = 'absolute';
  sentinel.style.top = '0';
  sentinel.style.left = '0';
  sentinel.style.pointerEvents = 'none';
  wrapper.style.position = 'sticky';
  wrapper.parentElement.style.position = 'relative';

  // Alternative: use scroll listener for stuck detection
  let ticking = false;
  const headerEl = document.querySelector('.section-header');
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const rect = wrapper.getBoundingClientRect();
        wrapper.classList.toggle('is-stuck', rect.top <= 0);
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
})();
</script>
</body>
</html>
