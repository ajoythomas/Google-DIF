<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touchstorm - YouTube Services | Sidebar Navigator</title>
<style>
  :root {
    --pink: #EF5C8D;
    --pink-dark: #d94a7a;
    --gray-bg: #f5f5f5;
    --white: #ffffff;
    --text-dark: #333333;
    --sidebar-width: 240px;
    --sidebar-bg: #1a1a1a;
  }

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: Helvetica, Arial, sans-serif;
    color: var(--text-dark);
    background: var(--white);
    overflow-x: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: var(--sidebar-width);
    height: 100vh;
    background: var(--sidebar-bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    padding: 28px 0 20px;
    user-select: none;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--pink);
    padding: 0 24px 18px;
  }

  /* Progress track */
  .sidebar-track {
    position: absolute;
    left: 0;
    top: 70px;
    bottom: 50px;
    width: 2px;
    background: #2a2a2a;
  }

  .sidebar-track-fill {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    background: var(--pink);
    transition: height 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* Nav list */
  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 0 0 0 0;
    scrollbar-width: none;
  }

  .sidebar-nav::-webkit-scrollbar {
    display: none;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 18px 9px 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    text-decoration: none;
  }

  .sidebar-item:hover .sidebar-item-name {
    color: #bbb;
  }

  .sidebar-item-number {
    font-size: 11px;
    font-weight: 700;
    color: var(--pink);
    min-width: 22px;
    opacity: 0.6;
    transition: opacity 0.3s ease;
    font-variant-numeric: tabular-nums;
  }

  .sidebar-item-name {
    font-size: 12px;
    font-weight: 400;
    color: #777;
    line-height: 1.3;
    transition: all 0.3s ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Active dot */
  .sidebar-item::before {
    content: '';
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%) scale(0);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--pink);
    transition: transform 0.3s ease;
  }

  .sidebar-item.active::before {
    transform: translateY(-50%) scale(1);
  }

  .sidebar-item.active .sidebar-item-number {
    opacity: 1;
  }

  .sidebar-item.active .sidebar-item-name {
    color: var(--white);
    font-size: 13px;
    font-weight: 600;
  }

  /* Bottom counter */
  .sidebar-counter {
    padding: 16px 24px 0;
    border-top: 1px solid #2a2a2a;
    margin-top: auto;
  }

  .sidebar-counter span {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .sidebar-counter span strong {
    color: var(--pink);
    font-weight: 700;
  }

  /* ── Main content ── */
  .main-content {
    margin-left: var(--sidebar-width);
    width: calc(100% - var(--sidebar-width));
  }

  /* Section header */
  .section-header {
    min-height: 40vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 40px 60px;
    background: var(--white);
    position: relative;
  }

  .section-header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 3px;
    background: var(--pink);
    border-radius: 2px;
  }

  .partnership-badge {
    font-size: 14px;
    color: #999;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 48px;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.15;
    margin-bottom: 16px;
  }

  .section-subtitle {
    font-size: 17px;
    color: #888;
    max-width: 500px;
    line-height: 1.6;
  }

  /* ── Service panels ── */
  .service-panel {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 80px 60px;
    position: relative;
    overflow: hidden;
  }

  .service-panel:nth-child(odd) {
    background: var(--white);
  }

  .service-panel:nth-child(even) {
    background: var(--gray-bg);
  }

  .service-panel:nth-child(even) .panel-text {
    order: 2;
  }

  .service-panel:nth-child(even) .panel-image {
    order: 1;
  }

  /* Watermark */
  .panel-watermark {
    position: absolute;
    font-size: 240px;
    font-weight: 800;
    color: rgba(0, 0, 0, 0.03);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .service-panel:nth-child(even) .panel-watermark {
    color: rgba(0, 0, 0, 0.04);
  }

  /* Panel text */
  .panel-text {
    position: relative;
    z-index: 1;
    max-width: 480px;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  .panel-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .panel-number {
    font-size: 13px;
    font-weight: 700;
    color: var(--pink);
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .panel-name {
    font-size: 34px;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .panel-rule {
    width: 50px;
    height: 3px;
    background: var(--pink);
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .panel-description {
    font-size: 16px;
    color: #666;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .panel-price {
    display: inline-block;
    background: var(--pink);
    color: var(--white);
    font-size: 14px;
    font-weight: 600;
    padding: 8px 22px;
    border-radius: 50px;
    margin-bottom: 20px;
    letter-spacing: 0.3px;
  }

  .panel-cta {
    display: block;
    margin-top: 4px;
    font-size: 14px;
    font-weight: 600;
    color: var(--pink);
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: color 0.2s ease;
    cursor: pointer;
  }

  .panel-cta:hover {
    color: var(--pink-dark);
  }

  .panel-cta::after {
    content: ' \2192';
    transition: margin-left 0.2s ease;
    margin-left: 0;
  }

  .panel-cta:hover::after {
    margin-left: 6px;
  }

  /* Panel image placeholder */
  .panel-image {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.7s ease 0.15s, transform 0.7s ease 0.15s;
  }

  .panel-image.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .image-placeholder {
    width: 100%;
    max-width: 420px;
    aspect-ratio: 4 / 3;
    border-radius: 16px;
    background: linear-gradient(135deg, #e8e8e8 0%, #d0d0d0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .service-panel:nth-child(even) .image-placeholder {
    background: linear-gradient(135deg, #ddd 0%, #c5c5c5 100%);
  }

  .image-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px dashed rgba(0,0,0,0.08);
    border-radius: 16px;
    pointer-events: none;
  }

  .image-placeholder-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 20px;
  }

  /* ── Responsive (basic) ── */
  @media (max-width: 1024px) {
    .sidebar {
      display: none;
    }
    .main-content {
      margin-left: 0;
      width: 100%;
    }
    .service-panel {
      grid-template-columns: 1fr;
      padding: 60px 32px;
      min-height: auto;
    }
    .service-panel:nth-child(even) .panel-text {
      order: 1;
    }
    .service-panel:nth-child(even) .panel-image {
      order: 2;
    }
    .panel-image {
      margin-top: 40px;
    }
    .section-title {
      font-size: 34px;
    }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-label">Services</div>

  <div class="sidebar-track">
    <div class="sidebar-track-fill" id="trackFill"></div>
  </div>

  <nav class="sidebar-nav" id="sidebarNav"></nav>

  <div class="sidebar-counter">
    <span><strong>13</strong> Services</span>
  </div>
</aside>

<!-- Main Content -->
<div class="main-content" id="mainContent">

  <!-- Header -->
  <header class="section-header">
    <p class="partnership-badge">Touchstorm &#129309; Google</p>
    <h1 class="section-title">Our Menu of Services</h1>
    <p class="section-subtitle">Expert YouTube solutions powered by data, creativity, and a deep partnership with Google.</p>
  </header>

  <!-- Service panels rendered by JS -->
  <div id="panelsContainer"></div>
</div>

<script>
(function () {
  'use strict';

  const services = [
    {
      num: '01',
      name: 'Custom Strategy Analysis',
      price: '$2,500 per engagement',
      desc: 'A deep-dive audit of your brand\'s current YouTube presence with tailored strategic recommendations. Our analysts benchmark your performance against industry standards and identify untapped opportunities. You receive a comprehensive playbook designed to accelerate growth.'
    },
    {
      num: '02',
      name: 'Brand Buzz Monitor',
      price: '$1,000/year',
      desc: 'Track real-time mentions, sentiment, and conversations about your brand across the YouTube ecosystem. Automated alerts keep you ahead of emerging trends and potential crises. Understand how audiences perceive your brand at scale.'
    },
    {
      num: '03',
      name: 'Category Trends',
      price: '$1,200/year',
      desc: 'Stay ahead of the curve with ongoing analysis of trending topics, formats, and audience behaviors in your category. We surface rising creators, viral formats, and seasonal patterns that matter. Turn trend data into actionable content strategy.'
    },
    {
      num: '04',
      name: 'Topic Finder',
      price: '$800/year',
      desc: 'Data-driven topic discovery that identifies high-potential content ideas your audience is actively searching for. Our algorithm cross-references search volume, competition, and relevance to your brand. Never run out of compelling video ideas again.'
    },
    {
      num: '05',
      name: 'Global Brand Consistency',
      price: '$3,000/year',
      desc: 'Ensure your brand\'s YouTube presence is cohesive and on-message across every market and language. We audit channel art, metadata, playlists, and content strategy for consistency worldwide. Protect brand equity while adapting to local audiences.'
    },
    {
      num: '06',
      name: 'Casting Cards',
      price: '$1,500 per search',
      desc: 'Find the perfect creator partners with detailed casting profiles matched to your brand values and audience. Each card includes audience demographics, engagement metrics, brand-safety scores, and collaboration history. Make confident influencer partnership decisions.'
    },
    {
      num: '07',
      name: 'Competitive Insights \u2013 Ranker',
      price: '$2,000/year',
      desc: 'See exactly where you stand against competitors with dynamic ranking dashboards and performance benchmarks. Track share-of-voice, upload cadence, engagement rates, and subscriber growth relative to your competitive set. Spot strategic openings before your rivals do.'
    },
    {
      num: '08',
      name: 'YT Social Listening \u2013 Influencer Focus',
      price: '$1,500/year',
      desc: 'Monitor influencer conversations and content that mention or relate to your brand across YouTube. Identify organic advocates, track sponsored content performance, and discover partnership opportunities. Turn influencer intelligence into a competitive advantage.'
    },
    {
      num: '09',
      name: 'YT Social Listening \u2013 Sentiment Focus',
      price: '$1,500/year',
      desc: 'Gauge audience sentiment through comment analysis, reaction patterns, and engagement tone across your content. Our NLP engine categorizes feedback into actionable themes and emotion clusters. Understand not just what people say, but how they feel.'
    },
    {
      num: '10',
      name: 'Share of Voice',
      price: '$2,500/year',
      desc: 'Measure your brand\'s visibility and presence relative to key competitors within your YouTube category. Track organic and paid share across search, suggested, and browse surfaces. Get clear data on whether your investments are moving the needle.'
    },
    {
      num: '11',
      name: 'Strategic Channel Business Plan',
      price: '$5,000 per plan',
      desc: 'A comprehensive business plan for your YouTube channel covering content strategy, revenue projections, and growth milestones. We model scenarios for different investment levels and content approaches. Leave with a boardroom-ready roadmap and clear KPIs.'
    },
    {
      num: '12',
      name: 'Community Management',
      price: '$1,200/month',
      desc: 'Professional moderation and engagement across your YouTube community, from comments to Community posts. Our team responds in your brand voice, surfaces fan insights, and fosters a loyal viewer base. Build lasting relationships with your most engaged audience.'
    },
    {
      num: '13',
      name: 'Channel Management',
      price: '$3,500/month',
      desc: 'Full-service YouTube channel operations including uploads, metadata optimization, playlist curation, and performance reporting. We handle the day-to-day so your team can focus on creating great content. End-to-end management backed by data and best practices.'
    }
  ];

  /* Short names for sidebar */
  const shortNames = [
    'Strategy Analysis',
    'Buzz Monitor',
    'Category Trends',
    'Topic Finder',
    'Brand Consistency',
    'Casting Cards',
    'Competitive Ranker',
    'Listening \u2013 Influencer',
    'Listening \u2013 Sentiment',
    'Share of Voice',
    'Channel Biz Plan',
    'Community Mgmt',
    'Channel Mgmt'
  ];

  /* Build sidebar items */
  const sidebarNav = document.getElementById('sidebarNav');
  services.forEach(function (s, i) {
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (i === 0 ? ' active' : '');
    item.dataset.index = i;
    item.innerHTML =
      '<span class="sidebar-item-number">' + s.num + '</span>' +
      '<span class="sidebar-item-name">' + shortNames[i] + '</span>';
    item.addEventListener('click', function () {
      const panel = document.getElementById('panel-' + i);
      if (panel) {
        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
    sidebarNav.appendChild(item);
  });

  /* Build service panels */
  const container = document.getElementById('panelsContainer');
  services.forEach(function (s, i) {
    const panel = document.createElement('section');
    panel.className = 'service-panel';
    panel.id = 'panel-' + i;

    panel.innerHTML =
      '<div class="panel-watermark">' + s.num + '</div>' +
      '<div class="panel-text" data-animate>' +
        '<p class="panel-number">SERVICE ' + s.num + '</p>' +
        '<h2 class="panel-name">' + s.name + '</h2>' +
        '<div class="panel-rule"></div>' +
        '<p class="panel-description">' + s.desc + '</p>' +
        '<span class="panel-price">' + s.price + '</span>' +
        '<a class="panel-cta">Learn More</a>' +
      '</div>' +
      '<div class="panel-image" data-animate>' +
        '<div class="image-placeholder">' +
          '<div class="image-placeholder-icon">' +
            '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>' +
          '</div>' +
        '</div>' +
      '</div>';

    container.appendChild(panel);
  });

  /* IntersectionObserver for scroll-based activation */
  const sidebarItems = document.querySelectorAll('.sidebar-item');
  const panels = document.querySelectorAll('.service-panel');
  const trackFill = document.getElementById('trackFill');
  let activeIndex = 0;

  function setActive(index) {
    if (index === activeIndex && sidebarItems[index].classList.contains('active')) return;
    activeIndex = index;
    sidebarItems.forEach(function (item, i) {
      item.classList.toggle('active', i === index);
    });
    /* Update progress bar */
    var pct = ((index + 1) / services.length) * 100;
    trackFill.style.height = pct + '%';

    /* Ensure active item is visible in sidebar nav */
    var activeEl = sidebarItems[index];
    activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  var panelObserver = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        var idx = parseInt(entry.target.id.replace('panel-', ''), 10);
        setActive(idx);
      }
    });
  }, {
    root: null,
    rootMargin: '-40% 0px -40% 0px',
    threshold: 0
  });

  panels.forEach(function (p) {
    panelObserver.observe(p);
  });

  /* Animate elements on scroll */
  var animElements = document.querySelectorAll('[data-animate]');
  var animObserver = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, {
    root: null,
    rootMargin: '0px 0px -10% 0px',
    threshold: 0.1
  });

  animElements.forEach(function (el) {
    animObserver.observe(el);
  });

  /* Initial state */
  setActive(0);
})();
</script>
</body>
</html>
