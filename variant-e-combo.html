<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Touchstorm YouTube Services - Variant E</title>
<style>
  :root {
    --pink: #EF5C8D;
    --pink-dark: #d94a7a;
    --pink-light: #fde8ef;
    --gray-bg: #f5f5f5;
    --white: #ffffff;
    --text-dark: #333333;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-hover: 0 8px 24px rgba(0,0,0,0.12);
    --shadow-expanded: 0 12px 40px rgba(0,0,0,0.14);
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    --border: rgba(0,0,0,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Helvetica, Arial, sans-serif;
    background: var(--gray-bg);
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Section ── */
  .services-section {
    padding: 80px 24px 100px;
    background: var(--gray-bg);
    min-height: 100vh;
  }

  /* ── Header ── */
  .section-header {
    text-align: center;
    max-width: 700px;
    margin: 0 auto 40px;
  }

  .eyebrow {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 16px;
  }

  .heading {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .heading .amp {
    display: inline-block;
    font-size: 0.65em;
    vertical-align: middle;
    margin: 0 4px;
    opacity: 0.5;
  }

  .subtitle {
    font-size: 17px;
    color: #777;
    line-height: 1.5;
  }

  .subtitle strong {
    color: var(--pink);
    font-weight: 700;
  }

  /* ── TAB BAR ── */
  .tab-bar-wrap {
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 var(--border), 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 40px;
  }

  .tab-bar {
    display: flex;
    align-items: stretch;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    padding: 18px 22px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #888;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
    white-space: nowrap;
    position: relative;
    font-family: Helvetica, Arial, sans-serif;
  }

  .tab-btn:hover { color: var(--text-dark); }
  .tab-btn.active { color: var(--pink); }

  .tab-count {
    font-size: 11px;
    font-weight: 700;
    background: var(--gray-bg);
    color: #999;
    border-radius: 100px;
    padding: 2px 7px;
    transition: background 0.2s, color 0.2s;
  }

  .tab-btn.active .tab-count {
    background: var(--pink-light);
    color: var(--pink);
  }

  .tab-indicator {
    position: absolute;
    bottom: 0;
    height: 3px;
    background: var(--pink);
    border-radius: 2px 2px 0 0;
    transition: left 0.25s cubic-bezier(0.4,0,0.2,1), width 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Grid ── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── Card (collapsed) ── */
  .card {
    background: var(--white);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 24px;
    cursor: pointer;
    position: relative;
    transition: transform var(--transition), box-shadow var(--transition);
    overflow: hidden;
    /* entrance animation */
    opacity: 0;
    transform: translateY(24px);
  }

  .card.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.5s ease, transform 0.5s ease, box-shadow var(--transition);
  }

  .card:not(.expanded):hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }

  .card.visible:not(.expanded):hover {
    transform: translateY(-2px);
  }

  /* hidden by tab filter */
  .card.tab-hidden {
    display: none;
  }

  /* Collapsed interior */
  .card-collapsed {
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: opacity 0.25s ease;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .card-number {
    font-size: 32px;
    font-weight: 800;
    color: var(--pink);
    line-height: 1;
    opacity: 0.85;
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--gray-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon svg {
    width: 20px;
    height: 20px;
    color: #aaa;
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.3;
    margin-top: 4px;
  }

  .card-price {
    font-size: 13px;
    color: #999;
    font-weight: 500;
  }

  .card-chevron {
    position: absolute;
    bottom: 16px;
    right: 16px;
    width: 24px;
    height: 24px;
    color: #ccc;
    transition: transform var(--transition), color var(--transition);
  }

  .card:not(.expanded):hover .card-chevron {
    color: var(--pink);
    transform: translateY(2px);
  }

  /* ── Card (expanded) ── */
  .card.expanded {
    grid-column: 1 / -1;
    box-shadow: var(--shadow-expanded);
    cursor: default;
    padding: 0;
  }

  .card.expanded .card-collapsed {
    opacity: 0;
    height: 0;
    overflow: hidden;
    padding: 0;
    pointer-events: none;
    position: absolute;
  }

  .card.expanded .card-chevron {
    display: none;
  }

  /* Expanded interior */
  .card-expanded {
    display: none;
    opacity: 0;
    transition: opacity 0.3s ease 0.1s;
  }

  .card.expanded .card-expanded {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    opacity: 1;
    min-height: 300px;
    position: relative;
    overflow: hidden;
  }

  .expanded-left {
    padding: 48px 40px 48px 52px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .expanded-watermark {
    position: absolute;
    top: -20px;
    left: -10px;
    font-size: 180px;
    font-weight: 900;
    color: var(--pink);
    opacity: 0.05;
    line-height: 1;
    z-index: 0;
    pointer-events: none;
  }

  .expanded-number {
    font-size: 14px;
    font-weight: 700;
    color: var(--pink);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    position: relative;
  }

  .expanded-name {
    font-size: clamp(22px, 2.5vw, 30px);
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1.2;
    margin-bottom: 16px;
    position: relative;
  }

  .expanded-desc {
    font-size: 15px;
    color: #666;
    line-height: 1.65;
    margin-bottom: 24px;
    max-width: 460px;
    position: relative;
  }

  .expanded-price-pill {
    display: inline-block;
    background: linear-gradient(135deg, var(--pink), var(--pink-dark));
    color: var(--white);
    font-size: 13px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 50px;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
    position: relative;
  }

  .expanded-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    color: var(--pink);
    text-decoration: none;
    border: 2px solid var(--pink);
    border-radius: 8px;
    padding: 10px 24px;
    transition: background var(--transition), color var(--transition);
    align-self: flex-start;
    position: relative;
  }

  .expanded-cta:hover {
    background: var(--pink);
    color: var(--white);
  }

  .expanded-right {
    background: linear-gradient(135deg, #f0f0f0, #e8e8e8);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-radius: 0 12px 12px 0;
    overflow: hidden;
  }

  .expanded-right::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(239,92,141,0.06), rgba(239,92,141,0.02));
  }

  .image-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: #bbb;
  }

  .image-placeholder svg {
    width: 64px;
    height: 64px;
    opacity: 0.5;
  }

  .image-placeholder span {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.5;
  }

  /* Close button */
  .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--white);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background var(--transition), transform var(--transition);
  }

  .close-btn:hover {
    background: var(--pink);
    transform: rotate(90deg);
  }

  .close-btn svg {
    width: 16px;
    height: 16px;
    color: var(--text-dark);
    transition: color var(--transition);
  }

  .close-btn:hover svg {
    color: var(--white);
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .services-section {
      padding: 48px 16px 64px;
    }

    .card-grid {
      grid-template-columns: 1fr;
    }

    .card.expanded .card-expanded {
      grid-template-columns: 1fr;
    }

    .expanded-left {
      padding: 32px 24px;
    }

    .expanded-right {
      border-radius: 0 0 12px 12px;
      min-height: 180px;
    }

    .expanded-watermark {
      font-size: 100px;
    }

    .tab-btn { padding: 16px 14px 14px; font-size: 12px; }
  }
</style>
</head>

  card.innerHTML = `
    <div class="card-collapsed">
      <div class="card-top">
        <span class="card-number">${s.num}</span>
        <div class="card-icon">${icons[i]}</div>
      </div>
      <div class="card-name">${s.name}</div>
      <div class="card-price">${s.price}</div>
    </div>
    ${chevronSVG}
    <div class="card-expanded">
      <div class="expanded-left">
        <div class="expanded-watermark">${s.num}</div>
        <div class="expanded-number">Service ${s.num}</div>
        <div class="expanded-name">${s.name}</div>
        <p class="expanded-desc">${s.desc}</p>
        <div class="expanded-price-pill">${s.price}</div>
        <a href="#" class="expanded-cta" onclick="event.preventDefault()">Learn More &rarr;</a>
      </div>
      <div class="expanded-right">
        <button class="close-btn" aria-label="Close" onclick="event.stopPropagation(); collapseCard(this.closest('.card'));">${closeSVG}</button>
        <div class="image-placeholder">
          ${imgSVG}
          <span>Add Image Here</span>
        </div>
      </div>
    </div>
  `;

  card.addEventListener('click', () => toggleCard(card));
  grid.appendChild(card);
});


// ── Expand / collapse logic ──────────────────────────────────
let currentExpanded = null;

function toggleCard(card) {
  if (card.classList.contains('expanded')) {
    collapseCard(card);
    return;
  }
  if (currentExpanded && currentExpanded !== card) {
    collapseCard(currentExpanded);
  }
  card.classList.add('expanded');
  currentExpanded = card;

  requestAnimationFrame(() => {
    setTimeout(() => {
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  });
}

function collapseCard(card) {
  card.classList.remove('expanded');
  if (currentExpanded === card) currentExpanded = null;
}


// ── Tab logic ───────────────────────────────────────────────
const tabBtns   = document.querySelectorAll('.tab-btn');
const allCards  = document.querySelectorAll('.card');
const indicator = document.getElementById('tabIndicator');
let activeTab   = 'all';

function positionIndicator(btn) {
  indicator.style.left  = btn.offsetLeft + 'px';
  indicator.style.width = btn.offsetWidth + 'px';
}

function switchTab(tab, btn) {
  if (tab === activeTab) return;

  // collapse any open card first
  if (currentExpanded) collapseCard(currentExpanded);

  activeTab = tab;
  tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  positionIndicator(btn);
  history.replaceState(null, '', tab === 'all' ? location.pathname : '#' + tab);

  // filter with staggered fade
  let delay = 0;
  allCards.forEach(card => {
    const cardTabs = card.dataset.tabs.split(' ');
    const show = cardTabs.includes(tab);
    if (show) {
      card.classList.remove('tab-hidden');
      card.style.opacity = '0';
      card.style.transform = 'translateY(16px)';
      const d = delay;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        card.style.transition = `opacity 0.35s ease ${d}ms, transform 0.35s ease ${d}ms, box-shadow var(--transition)`;
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }));
      delay += 45;
    } else {
      card.classList.add('tab-hidden');
    }
  });
}

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab, btn));
});

// indicator on load
requestAnimationFrame(() => {
  const active = document.querySelector('.tab-btn.active');
  if (active) positionIndicator(active);
});

// handle hash on load
const initHash = location.hash.replace('#','') || 'all';
const initBtn  = document.querySelector(`[data-tab="${initHash}"]`);
if (initBtn && initHash !== 'all') switchTab(initHash, initBtn);

window.addEventListener('hashchange', () => {
  const h = location.hash.replace('#','') || 'all';
  const b = document.querySelector(`[data-tab="${h}"]`);
  if (b) switchTab(h, b);
});

window.addEventListener('resize', () => {
  const active = document.querySelector('.tab-btn.active');
  if (active) positionIndicator(active);
});


// ── Scroll reveal ─────────────────────────────────────────
const observer = new IntersectionObserver((entries) => {
  entries.filter(e => e.isIntersecting).forEach((entry, i) => {
    const card = entry.target;
    if (!card.classList.contains('visible')) {
      const idx = [...grid.children].indexOf(card);
      setTimeout(() => card.classList.add('visible'), (idx % 4) * 80);
    }
    observer.unobserve(card);
  });
}, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

document.querySelectorAll('.card').forEach(card => observer.observe(card));
</script>
